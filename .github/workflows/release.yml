name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

env:
  GOTOOLCHAIN: auto

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go bootstrap
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Run Go checks
        run: .github/scripts/check-go.sh

      - name: Run race tests
        run: |
          go version
          case "$(go env GOVERSION)" in go1.27*) ;; *) echo "Go 1.27 is required, got $(go env GOVERSION)" >&2; exit 1;; esac
          go test -race ./...

      - name: Build docs
        run: |
          pnpm --dir docs install --frozen-lockfile
          pnpm --dir docs build

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: node .github/scripts/release-notes.js "${{ steps.tag.outputs.version }}" RELEASE_NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.tag.outputs.tag }}" --title "${{ steps.tag.outputs.tag }}" --notes-file RELEASE_NOTES.md
          else
            gh release create "${{ steps.tag.outputs.tag }}" --title "${{ steps.tag.outputs.tag }}" --notes-file RELEASE_NOTES.md --verify-tag
          fi
