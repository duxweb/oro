name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GOTOOLCHAIN: auto

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  go:
    name: Go build, vet, format, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go bootstrap
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Run Go checks
        run: .github/scripts/check-go.sh

  race:
    name: Go race tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go bootstrap
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Run race tests
        run: |
          go version
          case "$(go env GOVERSION)" in go1.27*) ;; *) echo "Go 1.27 is required, got $(go env GOVERSION)" >&2; exit 1;; esac
          go mod download
          go test -race ./...

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: pnpm run build

  changelog:
    name: Release changelog section
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release notes
        run: node .github/scripts/release-notes.js "${GITHUB_REF_NAME#v}" /tmp/release-notes.md
